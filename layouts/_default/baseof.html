<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }} — org.cispec{{ else }}org.cispec.{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="canonical" href="{{ .Permalink }}">
  <style>
    :root {
      --fg: #1a1a1a;
      --bg: #fefefe;
      --muted: #6b7280;
      --link: #1d4ed8;
      --border: #e5e7eb;
      --code-bg: #f3f4f6;
      --mono: "Roboto Mono", "JetBrains Mono", ui-monospace, Consolas, monospace;
      --sans: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      font-family: var(--sans);
      color: var(--fg);
      background: var(--bg);
      max-width: 920px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
      line-height: 1.6;
    }
    header.site {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }
    header.site a.home {
      font-family: var(--mono);
      font-weight: 600;
      font-size: 1.1rem;
      color: var(--fg);
      text-decoration: none;
    }
    header.site nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      margin-left: 1rem;
    }
    header.site nav a:hover { color: var(--link); }
    #searchToggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1;
      padding: 0.3em 0.55em;
      cursor: pointer;
      margin-left: 1rem;
    }
    #searchToggle:hover { color: var(--link); border-color: var(--link); }
    .search-wrap {
      margin-bottom: 1.5rem;
      padding: 0.75rem;
      background: var(--code-bg);
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .search-wrap[hidden] { display: none; }
    #search input[type="text"] {
      width: 100%;
      font-family: var(--sans);
      font-size: 0.95rem;
      padding: 0.5em 0.7em;
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    #search .pagefind-ui__results-area { margin-top: 0.75rem; }
    #search .pagefind-ui__result-title a { font-family: var(--mono); }
    h1 { font-size: 1.6rem; margin-bottom: 0.3rem; }
    h1 .prefix { color: var(--muted); font-weight: 400; }
    h2 { font-size: 1.15rem; margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1.25rem; }
    h3 { font-size: 1rem; }
    code, pre {
      font-family: var(--mono);
      font-size: 0.88rem;
    }
    code {
      background: var(--code-bg);
      padding: 0.1em 0.35em;
      border-radius: 3px;
    }
    pre {
      background: var(--code-bg);
      padding: 0.65rem 0.9rem;
      overflow-x: auto;
      border-radius: 4px;
      line-height: 1.45;
    }
    pre code { background: none; padding: 0; }
    a { color: var(--link); }
    table { border-collapse: collapse; width: 100%; font-size: 0.92rem; margin: 1rem 0; }
    th, td { text-align: left; padding: 0.45rem 0.6rem; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 600; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.02em; }
    .badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.15em 0.5em;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .badge-required    { background: #fee2e2; color: #991b1b; }
    .badge-recommended { background: #fef3c7; color: #92400e; }
    .badge-optional    { background: #e0e7ff; color: #3730a3; }
    .badge-core        { background: #d1fae5; color: #065f46; }
    .related { list-style: none; padding: 0; margin: 0.5rem 0; }
    .related li { display: inline-block; margin: 0 0.5rem 0.5rem 0; }
    .related a {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.85rem;
      padding: 0.25em 0.6em;
      background: var(--code-bg);
      border-radius: 4px;
      text-decoration: none;
      color: var(--fg);
    }
    .related a:hover { background: #e5e7eb; }
    footer.site {
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.82rem;
      color: var(--muted);
    }
    footer.site a { color: var(--muted); }

    /* Status block — same mechanism as W3C's TR page corner status:
       position: sticky, pure CSS, no JavaScript. Holds page identity
       metadata (term, conformance, spec version, document OID) and
       stays in view while scrolling the term's content. Not a TOC —
       term pages are short and single-topic, so there is nothing to
       navigate within the page; this is identity, not navigation. */
    .page-with-status {
      display: flex;
      gap: 2rem;
      align-items: flex-start;
    }
    .status-block {
      flex: 0 0 140px;
      position: sticky;
      top: 1.5rem;
      align-self: flex-start;
    }
    .status-block__inner {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem;
      background: var(--code-bg);
      font-size: 0.78rem;
      line-height: 1.5;
    }
    .status-block__home {
      display: block;
      font-family: var(--mono);
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--fg);
      text-decoration: none;
      margin-bottom: 0.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .status-block__home:hover { color: var(--link); }
    .status-block__term {
      font-family: var(--mono);
      font-weight: 600;
      word-break: break-word;
      margin-bottom: 0.5rem;
    }
    .status-block__row { margin-bottom: 0.4rem; }
    .status-block__row .badge { font-size: 0.62rem; }
    .status-block__meta {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.68rem;
      margin-top: 0.3rem;
    }
    .status-block__oid {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    /* Below this width the sticky sidebar no longer has room; let it
       fall back into normal document flow above the article. */
    @media (max-width: 640px) {
      .page-with-status { flex-direction: column; }
      .status-block { position: static; flex-basis: auto; width: 100%; }
      .status-block__inner { display: flex; flex-wrap: wrap; gap: 0.5rem 1rem; align-items: center; }
      .status-block__home { border: none; padding: 0; margin: 0; }
      .status-block__term { margin: 0; }
    }
  </style>
</head>
<body>
  <header class="site">
    <a class="home" href="/">cispec</a>
    <nav>
      <button id="searchToggle" type="button" aria-label="Search">&#x2315;</button>
      <a href="https://github.com/denzuko/cispec">source</a>
      <a href="https://cimatrix.org">cimatrix</a>
    </nav>
  </header>
  {{ partial "search.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="site">
    <p>
      BSD-2-Clause &middot; IANA PEN 42387 &middot; D&amp;B DUNS 039-271-257 &middot;
      spec v{{ .Site.Params.specVersion }} &middot;
      <a href="https://github.com/denzuko/cispec">denzuko/cispec</a>
    </p>
  </footer>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var toggle = document.getElementById("searchToggle");
      var wrap = document.getElementById("searchWrap");
      var loaded = false;

      function loadPagefind() {
        if (loaded) return;
        loaded = true;

        var css = document.createElement("link");
        css.rel = "stylesheet";
        css.href = "/pagefind/pagefind-ui.css";
        document.head.appendChild(css);

        var script = document.createElement("script");
        script.src = "/pagefind/pagefind-ui.js";
        script.onload = function () {
          new PagefindUI({ element: "#search", showSubResults: true });
          var input = wrap.querySelector("input[type='text']");
          if (input) input.focus();
        };
        document.body.appendChild(script);
      }

      if (toggle && wrap) {
        toggle.addEventListener("click", function () {
          var isHidden = wrap.hasAttribute("hidden");
          if (isHidden) {
            wrap.removeAttribute("hidden");
            loadPagefind();
          } else {
            wrap.setAttribute("hidden", "");
          }
        });
      }
    });
  </script>
</body>
</html>
