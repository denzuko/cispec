# SPDX-License-Identifier: BSD-2-Clause
# cispec site — build and deploy to Cloudflare R2
# Triggered on push to main and on release tags.

name: build-and-deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CISPEC_ORGANIZATION: daplanet
  CISPEC_ORGUNIT:      dps
  CISPEC_APPLICATION:  cispec-site
  CISPEC_VERSION:      ${{ github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for Hugo .GitInfo

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build site
        run: hugo --minify --baseURL "https://cispec.org/"

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: public/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site
          path: public/

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          # Sync public/ to R2 bucket — upload all files, delete removed ones
          find public/ -type f | while read f; do
            key="${f#public/}"
            # Set correct content-type per extension
            case "${f##*.}" in
              html) ct="text/html; charset=utf-8" ;;
              css)  ct="text/css" ;;
              js)   ct="application/javascript" ;;
              xml)  ct="application/xml" ;;
              json) ct="application/json" ;;
              svg)  ct="image/svg+xml" ;;
              png)  ct="image/png" ;;
              ico)  ct="image/x-icon" ;;
              txt)  ct="text/plain" ;;
              *)    ct="application/octet-stream" ;;
            esac
            wrangler r2 object put "cispec-site/${key}" \
              --file "${f}" \
              --content-type "${ct}" \
              --cache-control "public, max-age=3600"
          done
