# SPDX-License-Identifier: BSD-2-Clause
# cispec.org — build with Hugo extended, deploy via Wrangler to Cloudflare Pages
# Replaces CF Pages' native Git integration, which hit repeated build/auth
# failures (submodule handling, Hugo version/extended detection, token scope).
# This workflow gives full control and visibility over every step.

name: build-deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  HUGO_VERSION: "0.146.0"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for Hugo .GitInfo

      - name: Install Hugo extended
        run: |
          curl -sL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" \
            -o /tmp/hugo.tar.gz
          tar -xzf /tmp/hugo.tar.gz -C /tmp hugo
          sudo mv /tmp/hugo /usr/local/bin/hugo
          hugo version

      - name: Build site
        run: hugo --minify --baseURL "https://cispec.org/"

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: public/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site
          path: public/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=cispec
