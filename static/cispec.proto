// SPDX-License-Identifier: BSD-2-Clause
// cispec.proto — Protocol Buffers schema for org.cispec v1.0 — 51 terms
// Canonical governance: https://cispec.org/
// Validation toolkit:   https://cimatrix.org/
// IANA PEN: 42387  Spec version: 1.0

syntax = "proto3";
package org.cispec;
option java_package         = "org.cispec";
option java_outer_classname = "CISpecProto";
option go_package           = "cispec.org/proto";

// Conformance level
enum CISpecConformanceLevel {
  CONFORMANCE_UNSPECIFIED = 0;
  DECLARED = 1;  // required core keys present, self-asserted
  VERIFIED = 2;  // mechanically verified by cimatrix
  ATTESTED = 3;  // SLSA-attested, cited in production artefacts
}

// Extension term
message CISpecExtension {
  string term_name  = 1;
  string term_value = 2;
}

// Core label set — 6 fields, all REQUIRED for Declared conformance
message CISpecCoreLabels {
  string organization = 1; // 42387.2.1   X.500 O
  string orgunit      = 2; // 42387.2.1.1 X.500 OU
  string owner        = 3; // 42387.2.1.2 email, GPG-key-ID@domain, or role:identity
  string role         = 4; // 42387.2.1.3 operational role — universal
  string application  = 5; // 42387.2.1.4 designed purpose — universal
  string version      = 6; // 42387.2.4   semver 2.0
}

// Full label set
message CISpecLabelSet {
  CISpecCoreLabels core = 1;

  // Registry (42387.2.2.*)
  string oid  = 2;  // client OID arc pointer
  string duns = 3;  // iso.org.duns.<9-digit>

  // Financial (42387.2.3.*)
  string customer      = 4;
  string costcenter    = 5;
  string cost          = 6;   // amount:currency[:type]
  string unit_cost     = 7;   // rate:currency:per-unit
  string billing_model = 8;
  string depreciation  = 9;   // method:period
  string contract_ref  = 10;
  string usage         = 11;  // quantity:unit
  string vendor        = 12;

  // Lifecycle (42387.2.4.*)
  string specversion  = 13;
  string environment  = 14;
  string expiry       = 15;  // ISO 8601
  string acquired     = 16;  // ISO 8601

  // Custody (42387.2.5.*)
  string custody_chain = 17;
  string checksum      = 18;  // algorithm:hexdigest

  // Hardware CI-type (42387.2.6.2.*)
  string asset_tag     = 19;
  string serial_number = 20;
  string manufacturer  = 21;
  string make          = 22;
  string model         = 23;

  // Network CI-type (42387.2.6.4.*)
  string net_type    = 24;
  string ip_address  = 25;
  string mac_address = 26;
  string fqdn        = 27;

  // Evidence extended (42387.2.6.5.*)
  string case_id           = 28;
  string collection_method = 29;

  // Access/credential (42387.2.6.6.*)
  string assurance_level = 30;
  string key_type        = 31;

  // Facility (42387.2.6.7.*)
  string facility_class = 32;
  string capacity       = 33;

  // Contract CI-type (42387.2.6.8.*)
  string contract_type = 34;
  string counterparty  = 35;

  // Crypto (42387.2.6.9.*)
  string  algorithm  = 36;
  int32   key_length = 37;

  // Physical (42387.2.7.*)
  string location = 38;

  // Governance/compliance (42387.2.8.*)
  string classification  = 39;
  string retention       = 40;
  string boundary        = 41;
  enum   ExposureType { EXPOSURE_UNSPECIFIED = 0; PUBLIC = 1; RESTRICTED = 2; PRIVATE = 3; }
  ExposureType exposure  = 42;
  // EXPERIMENTAL
  string scan_policy     = 43;  // 42387.2.8.4
  string config_baseline = 44;  // 42387.2.8.5

  // Service management (42387.2.9.*)
  string sla        = 45;
  string commonname = 46;

  // Meta
  CISpecConformanceLevel conformance_level = 47;
  repeated CISpecExtension extensions      = 48;
}
